<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Missione Ciccio</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }

canvas {
 display:block;
 width:100vw;
 height:100vh;
}

#intro {
 position:absolute;
 width:100%;
 height:100%;
 background:#000;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
}

#box {
 background:#222;
 padding:40px;
 border:3px solid white;
 text-align:center;
 width:80%;
 font-size:20px;
}

button{
 font-size:18px;
}

#joystick {
 position:absolute;
 bottom:40px;
 left:40px;
 width:140px;
 height:140px;
 background:rgba(255,255,255,0.2);
 border-radius:50%;
}

#stick {
 position:absolute;
 width:70px;
 height:70px;
 background:white;
 border-radius:50%;
 left:35px;
 top:35px;
}

#shootBtn{
 position:absolute;
 bottom:40px;
 right:40px;
 width:120px;
 height:120px;
 border-radius:50%;
 background:red;
 color:white;
 border:none;
 font-size:20px;
}

#restartBtn{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
 font-size:20px;
}
</style>
</head>
<body>

<div id="intro">
 <div id="box">
  <h2>Missione Ciccio</h2>
  <p>Difendi Ciccio e raggiungi il castello.</p>
  <button onclick="startGame()">Continua</button>
 </div>
</div>

<canvas id="game"></canvas>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn">SPARA</button>
<button id="restartBtn">Ricomincia</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🔥 scala dinamica
function resize(){
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// player (più grande)
let player = {x:300, y:500, r:25};

let boss = null;
let bossBullets = [];
let bullets = [];

let inCastle = false;
let gameOver = false;
let victory = false;

let playerHits = 0;
let maxHits = 3;

function startGame(){
 document.getElementById("intro").style.display="none";
}

// sparo player
document.getElementById("shootBtn").onclick=()=>{
 bullets.push({x:player.x,y:player.y,vy:-12});
};

// boss spara lento
setInterval(()=>{
 if(inCastle && boss && !gameOver){
  bossBullets.push({
   x: boss.x,
   y: boss.y,
   vx: (player.x - boss.x)/120,
   vy: (player.y - boss.y)/120
  });
 }
},1500);

// entra nel boss (test rapido)
setTimeout(()=>{
 inCastle = true;

 player.x = canvas.width/2;
 player.y = canvas.height*0.85;

 boss = {x:canvas.width/2,y:100,r:80,life:150};

},2000);

// movimento mouse (per test desktop GitHub)
window.addEventListener("mousemove", e=>{
 player.x = e.clientX;
});

function draw(){

 ctx.fillStyle="#111";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 if(inCastle){

  // testo
  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("Ciccio è intrappolato!", canvas.width/2-180, 100);

  // player
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  // boss
  ctx.fillStyle="purple";
  ctx.beginPath();
  ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
  ctx.fill();

  // movimento boss
  let dx=player.x-boss.x;
  let dy=player.y-boss.y;
  let d=Math.sqrt(dx*dx+dy*dy);

  boss.x+=dx/d*0.4;
  boss.y+=dy/d*0.4;

  // proiettili boss
  ctx.fillStyle="red";
  bossBullets.forEach(b=>{
   b.x+=b.vx;
   b.y+=b.vy;

   ctx.beginPath();
   ctx.arc(b.x,b.y,10,0,Math.PI*2);
   ctx.fill();
  });

  // collisione
  bossBullets = bossBullets.filter(b=>{
   let dx=player.x-b.x;
   let dy=player.y-b.y;

   if(Math.sqrt(dx*dx+dy*dy)<player.r){
    playerHits++;
    return false;
   }
   return true;
  });

  // colpi player
  ctx.fillStyle="yellow";
  bullets.forEach(b=>{
   b.y+=b.vy;
   ctx.fillRect(b.x-5,b.y,10,15);
  });

  bullets = bullets.filter(b=>{
   let dx=b.x-boss.x;
   let dy=b.y-boss.y;

   if(Math.sqrt(dx*dx+dy*dy)<boss.r){
    boss.life -= 3;
    return false;
   }
   return b.y>0;
  });

  // vita boss
  ctx.fillStyle="purple";
  ctx.fillRect(20,40,boss.life*2,15);

  if(boss.life<=0){
   victory=true;
  }

  if(playerHits>=maxHits){
   gameOver=true;
  }
 }

 if(victory){
  ctx.fillStyle="lime";
  ctx.font="50px Arial";
  ctx.fillText("HAI SALVATO CICCIO!", canvas.width/2-250, canvas.height/2);
 }

 if(gameOver){
  ctx.fillStyle="red";
  ctx.font="50px Arial";
  ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);
 }

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
