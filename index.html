<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Game ULTRA</title>
<style>
body { margin: 0; overflow: hidden; background: #222; font-family: Arial; }

/* MENU */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.cars {
    display: flex;
    gap: 20px;
    margin: 20px;
}

.carOption {
    width: 50px;
    height: 80px;
    border: 3px solid white;
}

.selected { border: 3px solid lime; }

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 10px;
}

canvas { display: none; }

#restartBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
}
</style>
</head>
<body>

<div id="menu">
    <h1>🚗 CAR GAME ULTRA</h1>
    <p id="bestText">Record: 0</p>

    <div class="cars">
        <div class="carOption" data-type="1" style="background:blue;"></div>
        <div class="carOption" data-type="2" style="background:green;"></div>
        <div class="carOption" data-type="3" style="background:yellow;"></div>
    </div>

    <button id="playBtn">Gioca</button>
</div>

<canvas id="game"></canvas>
<button id="restartBtn">Ricomincia</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const playBtn = document.getElementById("playBtn");
const btn = document.getElementById("restartBtn");
const bestText = document.getElementById("bestText");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let width = canvas.width;
let height = canvas.height;

let best = localStorage.getItem("bestScore") || 0;
bestText.innerText = "Record: " + best;

// scelta auto
let carType = localStorage.getItem("carType") || "1";

document.querySelectorAll(".carOption").forEach(el=>{
    if(el.dataset.type === carType) el.classList.add("selected");

    el.onclick = ()=>{
        document.querySelectorAll(".carOption").forEach(c=>c.classList.remove("selected"));
        el.classList.add("selected");
        carType = el.dataset.type;
        localStorage.setItem("carType", carType);
    };
});

// gioco
let lanes = 3;
let laneWidth = width / lanes;

let carWidth = laneWidth * 0.5;
let carHeight = carWidth * 1.8;

let car, enemies, score, speed, baseSpeed, gameOver;
let turbo = false;

// start
playBtn.onclick = ()=>{
    menu.style.display = "none";
    canvas.style.display = "block";
    startGame();
};

function startGame(){
    car = {
        x: width/2 - carWidth/2,
        y: height/2 - carHeight/2
    };

    enemies = [];
    score = 0;
    baseSpeed = 5;
    gameOver = false;

    for(let i=0;i<3;i++) spawnRow();
}

// spawn
let rowSpacing = carHeight * 2.5;
let lastSpawnY = -rowSpacing;

function spawnRow(){
    let lanesArr = [0,1,2];
    let freeLane = lanesArr[Math.floor(Math.random()*3)];
    lanesArr.splice(lanesArr.indexOf(freeLane),1);

    let y = lastSpawnY - rowSpacing;
    lastSpawnY = y;

    lanesArr.forEach(lane=>{
        enemies.push({
            x: lane * laneWidth + (laneWidth - carWidth)/2,
            y: y,
            w: carWidth,
            h: carHeight,
            type: Math.random() // varietà traffico
        });
    });
}

// touch
let dragging = false;
let lastX = 0;

canvas.addEventListener("touchstart", e=>{
    dragging = true;
    lastX = e.touches[0].clientX;
});

canvas.addEventListener("touchend", ()=> dragging = false);

canvas.addEventListener("touchmove", e=>{
    if(dragging && !gameOver){
        let x = e.touches[0].clientX;
        let dx = x - lastX;
        car.x += dx;
        lastX = x;
    }
});

// turbo (tap con 2 dita)
canvas.addEventListener("touchstart", e=>{
    if(e.touches.length === 2) turbo = true;
});
canvas.addEventListener("touchend", ()=> turbo = false);

// suono
function beep(){
    let a = new AudioContext();
    let o = a.createOscillator();
    o.connect(a.destination);
    o.start();
    o.stop(a.currentTime + 0.1);
}

// disegno auto player
function drawCar(){
    if(carType == "1"){
        ctx.fillStyle = "blue";
        ctx.fillRect(car.x, car.y, carWidth, carHeight);
    }
    if(carType == "2"){
        ctx.fillStyle = "green";
        ctx.fillRect(car.x, car.y, carWidth, carHeight);
        ctx.fillStyle = "black";
        ctx.fillRect(car.x+10, car.y+10, carWidth-20, 20);
    }
    if(carType == "3"){
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(car.x+carWidth/2, car.y+carHeight/2, carWidth/2, 0, Math.PI*2);
        ctx.fill();
    }
}

// draw
function draw(){

    ctx.fillStyle = "#333";
    ctx.fillRect(0,0,width,height);

    ctx.fillStyle = "yellow";
    ctx.fillRect(0,0,20,height);
    ctx.fillRect(width-20,0,20,height);

    let dash = 120, gap = 60;

    for(let i=1;i<lanes;i++){
        let x = i * laneWidth;
        for(let y=0;y<height;y+=dash+gap){
            ctx.fillRect(x-10,y,20,dash);
        }
    }

    if(!gameOver){

        speed = baseSpeed + score * 0.1;
        if(turbo) speed += 8;

        drawCar();

        ctx.fillStyle = "red";
        enemies.forEach(e=>{
            e.y += speed + (e.type * 2);
            ctx.fillRect(e.x, e.y, e.w, e.h);
        });

        enemies = enemies.filter(e=>{
            if(e.y > height){
                score++;
                return false;
            }
            return true;
        });

        if(enemies.length === 0 || Math.min(...enemies.map(e=>e.y)) > rowSpacing){
            spawnRow();
        }

        enemies.forEach(e=>{
            if(
                car.x < e.x + e.w &&
                car.x + carWidth > e.x &&
                car.y < e.y + e.h &&
                car.y + carHeight > e.y
            ){
                gameOver = true;
                beep();

                if(score > best){
                    best = score;
                    localStorage.setItem("bestScore", best);
                }

                btn.style.display = "block";
            }
        });

    }

    ctx.fillStyle = "white";
    ctx.font = "22px Arial";
    ctx.fillText("Punti: " + score, 15, 30);
    ctx.fillText("Record: " + best, 15, 60);

    requestAnimationFrame(draw);
}

draw();

btn.onclick = ()=> location.reload();
</script>

</body>
    </html>
