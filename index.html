<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Missione Ciccio</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
canvas { display:none; }

#intro {
position:absolute;
width:100%;
height:100%;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

#box {
background:#222;
padding:30px;
border:3px solid white;
text-align:center;
width:80%;
}

#continueBtn {
margin-top:20px;
padding:15px 30px;
}

#joystick {
position:absolute;
bottom:30px;
left:30px;
width:100px;
height:100px;
background:rgba(255,255,255,0.2);
border-radius:50%;
display:none;
}

#stick {
position:absolute;
width:50px;
height:50px;
background:white;
border-radius:50%;
left:25px;
top:25px;
}

#shootBtn{
position:absolute;
bottom:30px;
right:30px;
width:80px;
height:80px;
border-radius:50%;
background:red;
color:white;
border:none;
display:none;
}

#restartBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}
</style>
</head>
<body>

<div id="intro">
 <div id="box">
  <h2>In nome della sburrevolezza</h2>
  <p>Difendi Ciccio e raggiungi il castello.</p>
  <button id="continueBtn">Continua</button>
 </div>
</div>

<canvas id="game"></canvas>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn">SPARA</button>
<button id="restartBtn">Ricomincia</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const intro = document.getElementById("intro");
const continueBtn = document.getElementById("continueBtn");

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");
const shootBtn = document.getElementById("shootBtn");
const restartBtn = document.getElementById("restartBtn");

// 🔥 UNICA MODIFICA (canvas + scala)
function resizeCanvas(){
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const SCALE = Math.min(canvas.width / 400, canvas.height / 800);

let gameStarted=false, gameOver=false, victory=false;
let inCastle=false;

// player
let player = {x:canvas.width/2, y:canvas.height*0.7, r:15*SCALE};

// vite
let playerHits = 0;
let maxHits = 3;

// livelli
let level=1;
let enemiesToSpawn=20;
let enemiesKilled=0;
let levelComplete=false;

// freccia
let arrow = {x: canvas.width/2, y: 80};

// nemici
let enemies=[];
let bullets=[];

// rocce
let rocks=[];

// boss + ciccio
let boss=null;
let bossBullets=[];
let ciccio = {x:canvas.width/2, y:150};

// start
continueBtn.onclick=()=>{
 intro.style.display="none";
 canvas.style.display="block";
 joystick.style.display="block";
 shootBtn.style.display="block";
 gameStarted=true;
};

// joystick
let joyX=0, joyY=0, active=false;

joystick.addEventListener("touchstart", ()=> active=true);

joystick.addEventListener("touchmove", e=>{
 if(!active) return;
 let rect=joystick.getBoundingClientRect();
 let x=e.touches[0].clientX-rect.left-50;
 let y=e.touches[0].clientY-rect.top-50;
 let dist=Math.sqrt(x*x+y*y);
 let max=40;
 if(dist>max){ x=x/dist*max; y=y/dist*max; }
 stick.style.left=(x+25)+"px";
 stick.style.top=(y+25)+"px";
 joyX=x/max; joyY=y/max;
});

joystick.addEventListener("touchend", ()=>{
 active=false; joyX=0; joyY=0;
 stick.style.left="25px"; stick.style.top="25px";
});

// sparo
shootBtn.addEventListener("touchstart", ()=>{
 if(!gameOver && gameStarted){
  bullets.push({x:player.x,y:player.y,vy:-10});
 }
});

// spawn nemici
function spawnEnemy(){
 if(enemies.length+enemiesKilled>=enemiesToSpawn) return;
 enemies.push({
  x:Math.random()*canvas.width,
  y:-20,
  r:15*SCALE,
  speed:(1+level)*SCALE
 });
}

setInterval(()=>{
 if(gameStarted && !gameOver && !levelComplete && !inCastle) spawnEnemy();
},800);

// boss spara lento
setInterval(()=>{
 if(inCastle && boss && !gameOver){
  bossBullets.push({
   x: boss.x,
   y: boss.y,
   vx: (player.x - boss.x) / 100,
   vy: (player.y - boss.y) / 100
  });
 }
},1500);

// rocce
function generateRocks(){
 rocks = [];
 let centerX = canvas.width / 2;
 let spacingY = 120;

 for(let i=0;i<6+level;i++){
  let y = 150 + i * spacingY;
  let offset = (i % 2 === 0) ? -40 : 40;
  let x = centerX + offset;
  rocks.push({ x:x, y:y, r:25*SCALE });
 }
}

// livello
function nextLevel(){
 level++;
 enemiesKilled=0;
 levelComplete=false;

 if(level==2){
  enemiesToSpawn=20;
  generateRocks();
 }

 if(level==3){
  enemiesToSpawn=20;
  generateRocks();
 }

 if(level==4){
  inCastle = true;
  enemies=[];
  bullets=[];
  bossBullets=[];
  rocks = [];

  player.x = canvas.width / 2;
  player.y = canvas.height * 0.85;

  boss = {x:canvas.width/2,y:100,r:50*SCALE,life:100};
  ciccio = {x:canvas.width/2,y:200};
 }
}

// draw
function draw(){

 ctx.fillStyle="#111";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 if(!inCastle){
  ctx.fillStyle="#444";
  ctx.fillRect(canvas.width/2-60,0,120,canvas.height);

  ctx.fillStyle="#777";
  rocks.forEach(r=>{
   ctx.beginPath();
   ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
   ctx.fill();
  });

  if(levelComplete){
   ctx.fillStyle="yellow";
   ctx.beginPath();
   ctx.moveTo(arrow.x,arrow.y);
   ctx.lineTo(arrow.x-20,arrow.y+40);
   ctx.lineTo(arrow.x+20,arrow.y+40);
   ctx.fill();
  }
 }

 if(gameStarted && !gameOver){

  let newX=player.x+joyX*3.5*SCALE;
  let newY=player.y+joyY*3.5*SCALE;

  let blocked=rocks.some(r=>{
   let dx=newX-r.x;
   let dy=newY-r.y;
   return Math.sqrt(dx*dx+dy*dy)<r.r+player.r;
  });

  if(!blocked){
   player.x=newX;
   player.y=newY;
  }

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="yellow";
  bullets.forEach(b=>{
   b.y+=b.vy;
   ctx.fillRect(b.x-3*SCALE,b.y,6*SCALE,10*SCALE);
  });

  if(!inCastle){

   ctx.fillStyle="red";
   enemies.forEach(e=>{
    let dx=player.x-e.x;
    let dy=player.y-e.y;
    let d=Math.sqrt(dx*dx+dy*dy);

    e.x += dx/d * e.speed;
    e.y += dy/d * e.speed;

    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();
   });

   if(enemiesKilled>=enemiesToSpawn){
    levelComplete=true;
   }

   if(levelComplete){
    nextLevel();
   }

  } else {

   ctx.fillStyle = "white";
   ctx.font = (20*SCALE)+"px Arial";
   ctx.fillText("Ciccio è intrappolato!", canvas.width/2 - 120, 80);

   ctx.fillStyle="purple";
   ctx.beginPath();
   ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
   ctx.fill();

   ctx.fillStyle="red";
   bossBullets.forEach(b=>{
    b.x+=b.vx;
    b.y+=b.vy;
    ctx.beginPath();
    ctx.arc(b.x,b.y,8*SCALE,0,Math.PI*2);
    ctx.fill();
   });

  }
 }

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
