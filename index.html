<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Missione Ciccio</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
canvas { display:none; }

#intro {
 position:absolute;
 width:100%;
 height:100%;
 background:#000;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
}

#box {
 background:#222;
 padding:30px;
 border:3px solid white;
 text-align:center;
 width:80%;
}

#joystick {
 position:absolute;
 bottom:30px;
 left:30px;
 width:120px;
 height:120px;
 background:rgba(255,255,255,0.2);
 border-radius:50%;
 display:none;
}

#stick {
 position:absolute;
 width:60px;
 height:60px;
 background:white;
 border-radius:50%;
 left:30px;
 top:30px;
}

#shootBtn{
 position:absolute;
 bottom:30px;
 right:30px;
 width:100px;
 height:100px;
 border-radius:50%;
 background:red;
 color:white;
 border:none;
 display:none;
}

#restartBtn{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 display:none;
}
</style>
</head>
<body>

<div id="intro">
 <div id="box">
  <h2>Missione Ciccio</h2>
  <button onclick="startGame()">Continua</button>
 </div>
</div>

<canvas id="game"></canvas>

<div id="joystick"><div id="stick"></div></div>
<button id="shootBtn">SPARA</button>
<button id="restartBtn">Ricomincia</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔥 SCALA AUTOMATICA
const SCALE = canvas.width / 400;

let gameStarted=false, gameOver=false, victory=false;
let inCastle=false;

// player
let player = {x:canvas.width/2, y:canvas.height*0.7, r:15*SCALE};

// vite
let playerHits = 0;
let maxHits = 3;

// livelli
let level=1;
let enemiesToSpawn=20;
let enemiesKilled=0;
let levelComplete=false;

// freccia
let arrow = {x: canvas.width/2, y: 80};

// nemici
let enemies=[];
let bullets=[];

// rocce
let rocks=[];

// boss
let boss=null;
let bossBullets=[];
let ciccio = {x:canvas.width/2, y:150};

// start
function startGame(){
 document.getElementById("intro").style.display="none";
 canvas.style.display="block";
 document.getElementById("joystick").style.display="block";
 document.getElementById("shootBtn").style.display="block";
 generateRocks();
 gameStarted=true;
}

// joystick
let joyX=0, joyY=0;

document.getElementById("joystick").addEventListener("touchmove", e=>{
 let rect=e.target.getBoundingClientRect();
 let x=e.touches[0].clientX-rect.left-60;
 let y=e.touches[0].clientY-rect.top-60;
 joyX=x/50;
 joyY=y/50;
});

// sparo
document.getElementById("shootBtn").onclick=()=>{
 bullets.push({x:player.x,y:player.y,vy:-10*SCALE});
};

// nemici
function spawnEnemy(){
 enemies.push({
  x:Math.random()*canvas.width,
  y:-20,
  r:15*SCALE,
  speed:(1+level)*SCALE
 });
}

setInterval(()=>{
 if(gameStarted && !gameOver && !levelComplete && !inCastle) spawnEnemy();
},800);

// boss spara
setInterval(()=>{
 if(inCastle && boss){
  bossBullets.push({
   x:boss.x,
   y:boss.y,
   vx:(player.x-boss.x)/100,
   vy:(player.y-boss.y)/100
  });
 }
},1500);

// rocce
function generateRocks(){
 rocks=[];
 for(let i=0;i<6+level;i++){
  rocks.push({
   x:canvas.width/2 + (i%2?-80:80),
   y:150+i*120,
   r:25*SCALE
  });
 }
}

// livelli
function nextLevel(){
 level++;
 enemiesKilled=0;
 levelComplete=false;

 if(level==2 || level==3){
  enemiesToSpawn=20;
  generateRocks();
 }

 if(level==4){
  inCastle=true;
  rocks=[];

  player.x=canvas.width/2;
  player.y=canvas.height*0.85;

  boss={x:canvas.width/2,y:100,r:50*SCALE,life:100};
  ciccio={x:canvas.width/2,y:200};
 }
}

// draw
function draw(){

 ctx.fillStyle="#111";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 if(!inCastle){
  ctx.fillStyle="#777";
  rocks.forEach(r=>{
   ctx.beginPath();
   ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
   ctx.fill();
  });
 }

 if(gameStarted && !gameOver){

  player.x+=joyX*3.5*SCALE;
  player.y+=joyY*3.5*SCALE;

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="yellow";
  bullets.forEach(b=>{
   b.y+=b.vy;
   ctx.fillRect(b.x-3*SCALE,b.y,6*SCALE,10*SCALE);
  });

  if(!inCastle){

   ctx.fillStyle="red";
   enemies.forEach(e=>{
    e.y+=e.speed;
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();
   });

   if(enemiesKilled>=enemiesToSpawn){
    levelComplete=true;
   }

  } else {

   // testo
   ctx.fillStyle="white";
   ctx.font=20*SCALE+"px Arial";
   ctx.fillText("Ciccio è intrappolato!", canvas.width/2-150, 80);

   // boss
   ctx.fillStyle="purple";
   ctx.beginPath();
   ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);
   ctx.fill();

   // proiettili boss
   ctx.fillStyle="red";
   bossBullets.forEach(b=>{
    b.x+=b.vx;
    b.y+=b.vy;
    ctx.beginPath();
    ctx.arc(b.x,b.y,8*SCALE,0,Math.PI*2);
    ctx.fill();
   });

  }
 }

 requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
