<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Game PRO</title>
<style>
body { margin: 0; overflow: hidden; background: #222; }
canvas { display: block; }
#restartBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 30px;
    font-size: 20px;
    display: none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="restartBtn">Ricomincia</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const btn = document.getElementById("restartBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let width = canvas.width;
let height = canvas.height;

// corsie
let lanes = 3;
let laneWidth = width / lanes;

// auto
let carWidth = laneWidth * 0.5;
let carHeight = carWidth * 1.8;

let car = {
    x: width/2 - carWidth/2,
    y: height/2 - carHeight/2,
    w: carWidth,
    h: carHeight
};

let enemies = [];

let baseSpeed = 5;
let speed = baseSpeed;
let score = 0;
let gameOver = false;

// record
let best = localStorage.getItem("bestScore") || 0;

// spawn
let rowSpacing = carHeight * 2.5;
let lastSpawnY = -rowSpacing;

function spawnRow() {
    let lanesArr = [0,1,2];
    let freeLane = lanesArr[Math.floor(Math.random()*3)];
    lanesArr.splice(lanesArr.indexOf(freeLane),1);

    let y = lastSpawnY - rowSpacing;
    lastSpawnY = y;

    lanesArr.forEach(lane => {
        enemies.push({
            x: lane * laneWidth + (laneWidth - carWidth)/2,
            y: y,
            w: carWidth,
            h: carHeight
        });
    });
}

for(let i=0;i<3;i++) spawnRow();

// touch
let dragging = false;
let lastX = 0;

canvas.addEventListener("touchstart", e=>{
    dragging = true;
    lastX = e.touches[0].clientX;
});

canvas.addEventListener("touchend", ()=> dragging = false);

canvas.addEventListener("touchmove", e=>{
    if(dragging && !gameOver){
        let x = e.touches[0].clientX;
        let dx = x - lastX;
        car.x += dx;
        lastX = x;
    }
});

// suono (beep semplice)
function beep(){
    let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctxAudio.createOscillator();
    osc.connect(ctxAudio.destination);
    osc.start();
    osc.stop(ctxAudio.currentTime + 0.1);
}

// esplosione
let explosion = null;

function draw(){

    ctx.fillStyle = "#333";
    ctx.fillRect(0,0,width,height);

    // strada
    ctx.fillStyle = "yellow";
    ctx.fillRect(0,0,20,height);
    ctx.fillRect(width-20,0,20,height);

    let dash = 120, gap = 60;

    for(let i=1;i<lanes;i++){
        let x = i * laneWidth;
        for(let y=0;y<height;y+=dash+gap){
            ctx.fillRect(x-10,y,20,dash);
        }
    }

    if(!gameOver){

        speed = baseSpeed + score * 0.1;

        // player (più bello)
        ctx.fillStyle = "blue";
        ctx.fillRect(car.x, car.y, car.w, car.h);
        ctx.fillStyle = "lightblue";
        ctx.fillRect(car.x+10, car.y+10, car.w-20, car.h-20);

        // nemici
        ctx.fillStyle = "red";
        enemies.forEach(e=>{
            e.y += speed;
            ctx.fillRect(e.x, e.y, e.w, e.h);
        });

        enemies = enemies.filter(e=>{
            if(e.y > height){
                score++;
                return false;
            }
            return true;
        });

        if(enemies.length === 0 || Math.min(...enemies.map(e=>e.y)) > rowSpacing){
            spawnRow();
        }

        // collisione
        enemies.forEach(e=>{
            if(
                car.x < e.x + e.w &&
                car.x + car.w > e.x &&
                car.y < e.y + e.h &&
                car.y + car.h > e.y
            ){
                gameOver = true;
                beep();

                if(score > best){
                    best = score;
                    localStorage.setItem("bestScore", best);
                }

                explosion = {x: car.x, y: car.y, r: 10};
                btn.style.display = "block";
            }
